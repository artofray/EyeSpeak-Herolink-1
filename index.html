<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EyeSpeak Herolink 1 - Maggie.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            /* Global Oasis Palette */
            --bg-0: #050A12;
            --bg-1: #081627;
            --cyan: #28E7FF;
            --cyan-2: #0AAAD4;
            --amber: #FFB020;
            --amber-2: #FF7A18;
            --txt: #D8F6FF;
            --muted: #7FB7C8;
            --panel: rgba(10, 26, 44, 0.62);
            --stroke: rgba(40, 231, 255, 0.28);
            --glow: rgba(40, 231, 255, 0.55);
            --ok: #2EFFB3;
            --warn: #FFB020;
            --bad: #FF4D6D;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-0);
            background-image: 
                radial-gradient(circle at 50% 50%, var(--bg-1) 0%, var(--bg-0) 100%),
                linear-gradient(var(--stroke) 1px, transparent 1px),
                linear-gradient(90deg, var(--stroke) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: var(--txt);
            overflow: hidden;
            margin: 0;
            user-select: none;
        }

        .hud-panel {
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--stroke);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .text-hud { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        .hex-btn {
            position: relative;
            clip-path: polygon(20% 0%, 80% 0%, 100% 50%, 80% 100%, 20% 100%, 0% 50%);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--panel);
            border: 2px solid var(--stroke);
        }

        .hex-btn-inner {
            position: absolute;
            inset: 3px;
            clip-path: polygon(20% 0%, 80% 0%, 100% 50%, 80% 100%, 20% 100%, 0% 50%);
            background: rgba(255,255,255,0.02);
            z-index: 1;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(40, 231, 255, 0.05) 50%, transparent);
            height: 100%;
            pointer-events: none;
            animation: scanline 12s linear infinite;
            z-index: 100;
        }

        @keyframes lock-flash {
            0% { background: var(--amber); box-shadow: 0 0 50px var(--amber); }
            100% { background: var(--panel); }
        }
        .lock-in { animation: lock-flash 0.3s ease-out forwards; }

        @keyframes orbit {
            from { transform: rotate(0deg) translateX(45px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(45px) rotate(-360deg); }
        }
        .energy-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cyan);
            z-index: 20;
            pointer-events: none;
        }

        .targeting-reticle {
            border: 2px solid var(--cyan);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .rotating { animation: rotate-slow 15s linear infinite; }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>

</head>

</html>
