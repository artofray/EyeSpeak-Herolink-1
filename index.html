<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EyeSpeak Herolink 1 - Maggie.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #020617;
            background-image: 
                radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%),
                linear-gradient(rgba(15, 23, 42, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 23, 42, 0.1) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: #38bdf8;
            overflow: hidden;
            margin: 0;
            user-select: none;
        }

        .hud-glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(56, 189, 248, 0.1);
        }

        .hud-border-cyan { border: 2px solid #0ea5e9; box-shadow: 0 0 15px rgba(14, 165, 233, 0.4); }
        .hud-border-amber { border: 2px solid #f59e0b; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }

        .text-hud { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(56, 189, 248, 0.05) 50%, transparent);
            height: 100%;
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }

        @keyframes charging-energy {
          0% { transform: scale(1.05); filter: brightness(1); box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }
          50% { transform: scale(1.1); filter: brightness(1.4); box-shadow: 0 0 30px rgba(245, 158, 11, 0.7); }
          100% { transform: scale(1.05); filter: brightness(1); box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }
        }
        .charging-glow {
          animation: charging-energy 0.6s ease-in-out infinite;
          z-index: 50;
        }

        .targeting-reticle {
            border: 2px solid #0ea5e9;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 100;
            transition: all 0.1s ease-out;
        }
        .reticle-inner {
            position: absolute;
            inset: -8px;
            border: 2px dashed #f59e0b;
            border-radius: 50%;
            animation: spin 4s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Button Energies */
        .energy-btn {
            position: relative;
            transition: all 0.3s;
            clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
        }
        .energy-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(56, 189, 248, 0.1));
            transition: opacity 0.3s;
        }
        
        /* Grid Colors */
        .grid-c0 { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .grid-c1 { border-color: #f59e0b; background: rgba(245, 158, 11, 0.05); }
        .grid-c2 { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .grid-c3 { border-color: #0ea5e9; background: rgba(14, 165, 233, 0.05); }
        .grid-c4 { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.05); }
        .grid-c5 { border-color: #ec4899; background: rgba(236, 72, 153, 0.05); }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body class="h-screen flex flex-col">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
</body>
</html>
